<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Mason's Baseball Card Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Main Collection Site - No Password Required -->
    <div id="mainSite" class="main-site">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1><svg class="baseball-header-icon" viewBox="0 0 32 32" width="40" height="40">
                    <circle cx="16" cy="16" r="15" fill="#f8f8f8" stroke="#e0e0e0" stroke-width="1"/>
                    <path d="M6 16 Q10 8 16 16 Q22 24 26 16" stroke="#cc0000" stroke-width="1.5" fill="none"/>
                    <path d="M26 16 Q22 8 16 16 Q10 24 6 16" stroke="#cc0000" stroke-width="1.5" fill="none"/>
                    <g stroke="#cc0000" stroke-width="1" fill="none">
                        <path d="M7 14 L9 15"/>
                        <path d="M9 18 L7 19"/>
                        <path d="M11 10 L13 12"/>
                        <path d="M13 21 L11 23"/>
                        <path d="M19 10 L21 12"/>
                        <path d="M21 21 L19 23"/>
                        <path d="M23 14 L25 15"/>
                        <path d="M25 18 L23 19"/>
                    </g>
                </svg> Mason's Baseball Card Collection</h1>
                <div class="collection-stats">
                    <div class="stat">
                        <span class="stat-number" id="totalCards">0</span>
                        <span class="stat-label">Cards</span>
                    </div>
                    <div class="stat">
                        <span class="stat-number" id="totalValue">$0</span>
                        <span class="stat-label">Total Value</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Search and Filters -->
        <div class="controls">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search by player name or team..." onkeyup="filterCards()">
            </div>
            <div class="filter-container">
                <select id="teamFilter" onchange="filterCards()">
                    <option value="">All Teams</option>
                </select>
                <select id="sortSelect" onchange="sortCards()">
                    <option value="name">Sort by Name</option>
                    <option value="value">Sort by Value</option>
                    <option value="team">Sort by Team</option>
                    <option value="number">Sort by Number</option>
                </select>
            </div>
        </div>

        <!-- Card Grid -->
        <div id="cardGrid" class="card-grid">
            <!-- Cards will be populated by JavaScript -->
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>© 2026 Mason's Baseball Card Collection | Private Collection</p>
        </footer>
    </div>

    <script src="all-cards-data.js"></script>
    <script>
        // Simplified script - no password protection
        let cardsData = [];
        let filteredCards = [];

        // Load cards immediately
        window.addEventListener('load', function() {
            loadCardsData();
        });

        function loadCardsData() {
            cardsData = allMasonCards;
            filteredCards = [...cardsData];
            
            updateStats();
            populateTeamFilter();
            renderCards();
        }

        function updateStats() {
            const totalCards = cardsData.length;
            const totalValue = cardsData.reduce((sum, card) => sum + card.value, 0);
            
            document.getElementById('totalCards').textContent = totalCards.toLocaleString();
            document.getElementById('totalValue').textContent = `$${totalValue.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
        }

        function populateTeamFilter() {
            const teamFilter = document.getElementById('teamFilter');
            const teams = [...new Set(cardsData.map(card => card.team))].sort();
            
            teamFilter.innerHTML = '<option value="">All Teams</option>';
            
            teams.forEach(team => {
                const option = document.createElement('option');
                option.value = team;
                option.textContent = team;
                teamFilter.appendChild(option);
            });
        }

        function filterCards() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const selectedTeam = document.getElementById('teamFilter').value;
            
            filteredCards = cardsData.filter(card => {
                const matchesSearch = card.player.toLowerCase().includes(searchTerm) ||
                                    card.team.toLowerCase().includes(searchTerm) ||
                                    card.number.toLowerCase().includes(searchTerm);
                
                const matchesTeam = !selectedTeam || card.team === selectedTeam;
                
                return matchesSearch && matchesTeam;
            });
            
            renderCards();
        }

        function sortCards() {
            const sortBy = document.getElementById('sortSelect').value;
            
            filteredCards.sort((a, b) => {
                switch (sortBy) {
                    case 'name':
                        return a.player.localeCompare(b.player);
                    case 'value':
                        return b.value - a.value;
                    case 'team':
                        return a.team.localeCompare(b.team);
                    case 'number':
                        return a.number.localeCompare(b.number);
                    default:
                        return 0;
                }
            });
            
            renderCards();
        }

        function renderCards() {
            const cardGrid = document.getElementById('cardGrid');
            
            if (filteredCards.length === 0) {
                cardGrid.innerHTML = `
                    <div class="loading" style="grid-column: 1 / -1;">
                        <div>No cards found matching your criteria</div>
                    </div>
                `;
                return;
            }
            
            cardGrid.innerHTML = filteredCards.map(card => `
                <div class="card">
                    <div class="card-header">
                        <div class="card-number">#${card.number}</div>
                        <div class="card-value">$${card.value.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                    </div>
                    <div class="player-name">${card.player}</div>
                    <div class="team-name">${card.team}</div>
                    <div class="card-image-container" onclick="viewCardImage('${card.imageUrl}', '${card.player}')">
                        ${card.imageUrl ? 
                            `<img src="${card.imageUrl}" alt="${card.player}" class="card-image" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                             <div class="image-placeholder" style="display: none;">🃏</div>` :
                            `<div class="image-placeholder">🃏</div>`
                        }
                    </div>
                    <button class="view-image-btn" onclick="viewCardImage('${card.imageUrl}', '${card.player}')">
                        View Full Size
                    </button>
                </div>
            `).join('');
        }

        function viewCardImage(imageUrl, playerName) {
            if (imageUrl && imageUrl !== 'undefined') {
                window.open(imageUrl, '_blank');
            } else {
                alert(`No image available for ${playerName}`);
            }
        }
    </script>
</body>
</html>
